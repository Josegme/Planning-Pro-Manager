  ::-webkit-scrollbar-thumb { background: hsl(214.3 31.8% 85%); border-radius: 5px; border: 2px solid white; }

  /* hide tailwind warning */
  body { overflow-x: hidden; }
  .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
  .dotted-bg {
    background-image: radial-gradient(hsl(214.3 31.8% 85%) 1px, transparent 1px);

  /* focus rings consistent */
  button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, [role="button"]:focus-visible {
